name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 context_boundary_check.py --self-test
      - run: python3 context_boundary_check.py examples/context_outputs.jsonl
      - run: python3 -m py_compile context_boundary_check.py
